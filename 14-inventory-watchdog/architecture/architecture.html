<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Watchdog Architecture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0a1628 0%, #16233b 50%, #0f1d33 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }
  .canvas {
    width: 760px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    padding: 28px 24px 32px;
  }
  .head { text-align: center; margin-bottom: 8px; }
  .head .logo {
    display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px;
  }
  .head .mark {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #1D9E75, #0F6E56);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 15px;
  }
  .head .name { color: #f1f5f9; font-size: 19px; font-weight: 600; letter-spacing: -0.2px; }
  .head .sub { color: #7c8aa0; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
  svg { display: block; width: 100%; height: auto; }
  .tlabel { fill: #e8edf5; font-size: 14px; font-weight: 500; }
  .slabel { fill: #8ea0b8; font-size: 12px; }
  .zlabel { fill: #c5d0e0; font-size: 12px; font-weight: 500; }
  @keyframes flow { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
  @keyframes travel { 0% { offset-distance: 0%; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
  @keyframes spark { 0%,100% { transform: scale(1); opacity: .85; } 50% { transform: scale(1.2); opacity: 1; } }
  .fl { stroke-dasharray: 5 4; animation: flow 1.1s linear infinite; }
  .pk { animation: travel 2.6s ease-in-out infinite; }
  .p1 { offset-path: path("M340 104 L340 140"); }
  .p2 { offset-path: path("M340 244 L340 280"); animation-delay: .5s; }
  .p3 { offset-path: path("M340 348 L340 384"); animation-delay: 1s; }
  .p4 { offset-path: path("M340 452 L340 488"); animation-delay: 1.5s; }
  .p5 { offset-path: path("M340 556 L340 592"); animation-delay: 2s; }
  .spk { transform-origin: center; transform-box: fill-box; animation: spark 1.6s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) { .fl,.pk,.spk { animation: none; } }
</style>
</head>
<body>
<div class="canvas">
  <div class="head">
    <div class="logo"><span class="mark">IW</span><span class="name">Inventory Watchdog</span></div>
    <div class="sub">Slow moving stock detection · Azure</div>
  </div>
  <svg viewBox="0 0 680 692" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>Inventory Watchdog architecture</title>
    <desc>Vertical pipeline from synthetic warehouse extracts through an Azure Data Lake, a Function scan engine, gpt-5-mini narration, and a Logic App, to the operations inbox.</desc>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#5f6b80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <g>
      <rect x="200" y="44" width="280" height="60" rx="8" fill="rgba(136,135,128,0.12)" stroke="#888780" stroke-width="1"/>
      <g stroke="#aab0a8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(224,64)">
        <path d="M1 1 H10 L14 5 V17 H1 Z"/><path d="M10 1 V5 H14"/><path d="M4 9 H11"/><path d="M4 12 H11"/></g>
      <text class="tlabel" x="256" y="68" dominant-baseline="central">Synthetic WMS extracts</text>
      <text class="slabel" x="256" y="86" dominant-baseline="central">item master, lots, picks</text>
    </g>

    <line x1="340" y1="104" x2="340" y2="140" stroke="#5f6b80" stroke-width="1.5" class="fl" marker-end="url(#arrow)"/>
    <circle class="pk p1" r="3.5" fill="#2fd39e"/>

    <rect x="160" y="144" width="360" height="100" rx="12" fill="rgba(29,158,117,0.12)" stroke="#1D9E75" stroke-width="1"/>
    <g stroke="#3fcfa0" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(184,158)">
      <ellipse cx="10" cy="4" rx="6" ry="2.4"/><path d="M4 4 V15 a6 2.4 0 0 0 12 0 V4"/><path d="M4 9.5 a6 2.4 0 0 0 12 0"/></g>
    <text class="tlabel" x="218" y="168" dominant-baseline="central">Azure Data Lake Gen2</text>
    <rect x="176" y="190" width="104" height="38" rx="6" fill="rgba(136,135,128,0.16)" stroke="#888780" stroke-width="0.8"/>
    <text class="zlabel" x="228" y="209" text-anchor="middle" dominant-baseline="central">Bronze</text>
    <rect x="288" y="190" width="104" height="38" rx="6" fill="rgba(136,135,128,0.16)" stroke="#888780" stroke-width="0.8"/>
    <text class="zlabel" x="340" y="209" text-anchor="middle" dominant-baseline="central">Silver</text>
    <rect x="400" y="190" width="104" height="38" rx="6" fill="rgba(136,135,128,0.16)" stroke="#888780" stroke-width="0.8"/>
    <text class="zlabel" x="452" y="209" text-anchor="middle" dominant-baseline="central">Gold</text>

    <line x1="340" y1="244" x2="340" y2="280" stroke="#5f6b80" stroke-width="1.5" class="fl" marker-end="url(#arrow)"/>
    <circle class="pk p2" r="3.5" fill="#2fd39e"/>

    <rect x="200" y="284" width="280" height="64" rx="8" fill="rgba(127,119,221,0.14)" stroke="#7F77DD" stroke-width="1"/>
    <g stroke="#9a92ec" stroke-width="1.6" fill="#9a92ec" stroke-linejoin="round" transform="translate(224,306)">
      <polygon points="11 1 4 11 9 11 8 19 16 8 10 8"/></g>
    <text class="tlabel" x="256" y="310" dominant-baseline="central">Azure Function</text>
    <text class="slabel" x="256" y="330" dominant-baseline="central">FSN, aging, cost, expiry</text>

    <line x1="340" y1="348" x2="340" y2="384" stroke="#5f6b80" stroke-width="1.5" class="fl" marker-end="url(#arrow)"/>
    <circle class="pk p3" r="3.5" fill="#2fd39e"/>

    <rect x="200" y="388" width="280" height="64" rx="8" fill="rgba(216,90,48,0.14)" stroke="#D85A30" stroke-width="1"/>
    <g class="spk" transform="translate(224,410)"><path d="M10 1 L12 8 L19 10 L12 12 L10 19 L8 12 L1 10 L8 8 Z" fill="#e8703f"/></g>
    <text class="tlabel" x="256" y="414" dominant-baseline="central">Azure OpenAI</text>
    <text class="slabel" x="256" y="434" dominant-baseline="central">gpt-5-mini writes the memo</text>

    <line x1="340" y1="452" x2="340" y2="488" stroke="#5f6b80" stroke-width="1.5" class="fl" marker-end="url(#arrow)"/>
    <circle class="pk p4" r="3.5" fill="#2fd39e"/>

    <rect x="200" y="492" width="280" height="64" rx="8" fill="rgba(55,138,221,0.14)" stroke="#378ADD" stroke-width="1"/>
    <g stroke="#5ba1e8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(224,514)">
      <circle cx="4" cy="5" r="2.2"/><circle cx="16" cy="5" r="2.2"/><circle cx="10" cy="16" r="2.4"/>
      <path d="M5.6 6.4 L8.8 13.6"/><path d="M14.4 6.4 L11.2 13.6"/><path d="M6 5 H14"/></g>
    <text class="tlabel" x="256" y="518" dominant-baseline="central">Azure Logic App</text>
    <text class="slabel" x="256" y="538" dominant-baseline="central">fetch memo, send email</text>

    <line x1="340" y1="556" x2="340" y2="592" stroke="#5f6b80" stroke-width="1.5" class="fl" marker-end="url(#arrow)"/>
    <circle class="pk p5" r="3.5" fill="#2fd39e"/>

    <rect x="200" y="596" width="280" height="60" rx="8" fill="rgba(136,135,128,0.12)" stroke="#888780" stroke-width="1"/>
    <g stroke="#aab0a8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(224,616)">
      <rect x="2" y="3" width="16" height="13" rx="2"/><path d="M2.5 4 L10 11 L17.5 4"/></g>
    <text class="tlabel" x="256" y="620" dominant-baseline="central">Operations inbox</text>
    <text class="slabel" x="256" y="640" dominant-baseline="central">Monday 7:30 AM Toronto</text>
  </svg>
</div>
</body>
</html>
