<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 11px; fill: #586069; }
  .label { font-size: 11px; fill: #586069; }
  .small { font-size: 10px; font-weight: 600; }
  .heading { font-size: 15px; font-weight: 600; fill: #24292e; }
</style>
<defs>
  <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text class="heading" x="340" y="24" text-anchor="middle">Cloud Cost Watchdog — automated zombie resource detection</text>

<!-- Phase 1: Schedule -->
<rect x="200" y="40" width="280" height="44" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text class="title" x="340" y="58" text-anchor="middle" fill="#3C3489">Daily schedule</text>
<text class="sub" x="340" y="72" text-anchor="middle">6:00 AM UTC every day</text>

<!-- Arrow -->
<line x1="340" y1="84" x2="340" y2="110" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arw)"/>
<text class="label" x="348" y="101" text-anchor="start">triggers</text>

<!-- Phase 2: Runbook -->
<rect x="120" y="110" width="440" height="44" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text class="title" x="340" y="128" text-anchor="middle" fill="#0C447C">Scan-ZombieResources runbook</text>
<text class="sub" x="340" y="142" text-anchor="middle">Authenticates with managed identity, scans entire subscription</text>

<!-- Arrow -->
<line x1="340" y1="154" x2="340" y2="180" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arw)"/>
<text class="label" x="348" y="171" text-anchor="start">detects</text>

<!-- Phase 3: Zombie Categories -->
<rect x="80" y="180" width="520" height="110" rx="12" fill="#FFF8F0" stroke="#BA7517" stroke-width="1"/>
<text class="title" x="340" y="200" text-anchor="middle" fill="#633806">Zombie resource categories</text>

<rect x="100" y="210" width="110" height="28" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="small" x="155" y="228" text-anchor="middle" fill="#633806">Orphaned disks</text>

<rect x="220" y="210" width="110" height="28" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="small" x="275" y="228" text-anchor="middle" fill="#633806">Unattached IPs</text>

<rect x="340" y="210" width="110" height="28" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="small" x="395" y="228" text-anchor="middle" fill="#633806">Orphaned NICs</text>

<rect x="460" y="210" width="110" height="28" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="small" x="515" y="228" text-anchor="middle" fill="#633806">Unused NSGs</text>

<rect x="220" y="248" width="240" height="28" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="small" x="340" y="266" text-anchor="middle" fill="#633806">Empty resource groups</text>

<!-- Arrow -->
<line x1="340" y1="290" x2="340" y2="320" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arw)"/>
<text class="label" x="348" y="309" text-anchor="start">calculates waste</text>

<!-- Phase 4: Cost Report -->
<rect x="140" y="320" width="400" height="44" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text class="title" x="340" y="338" text-anchor="middle" fill="#085041">Cost waste report</text>
<text class="sub" x="340" y="352" text-anchor="middle">Resource name, type, group, estimated monthly cost</text>

<!-- Arrow -->
<line x1="340" y1="364" x2="340" y2="394" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arw)"/>
<text class="label" x="348" y="383" text-anchor="start">triggers webhook</text>

<!-- Phase 5: Logic App Email -->
<rect x="160" y="394" width="360" height="44" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<text class="title" x="340" y="412" text-anchor="middle" fill="#712B13">Logic App — email notification</text>
<text class="sub" x="340" y="426" text-anchor="middle">Scan results delivered to admin inbox</text>

<!-- Bottom summary -->
<rect x="170" y="462" width="340" height="34" rx="17" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="title" x="340" y="483" text-anchor="middle" fill="#444441">Schedule → Scan → Detect → Report → Notify</text>
</svg>