<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Guardian — Compliance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0e1a; --surface: #111827; --border: #1e2a3e; --text: #e2e8f0; --text-muted: #94a3b8; --text-dim: #64748b; --accent: #3b82f6; --green: #4ade80; --yellow: #facc15; --red: #f87171; --font: 'DM Sans', sans-serif; --mono: 'JetBrains Mono', monospace; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { padding: 28px 40px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .shield { width: 36px; height: 36px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header h1 span { color: var(--text-muted); font-weight: 400; font-size: 14px; margin-left: 8px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .status-text { font-size: 12px; color: var(--text-muted); }
  .btn-refresh { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-family: var(--font); font-size: 13px; cursor: pointer; }
  .btn-refresh:hover { border-color: var(--accent); color: var(--text); }
  .dashboard { padding: 28px 40px; }
  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 28px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
  .kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .kpi.green .kpi-value { color: var(--green); }
  .kpi.yellow .kpi-value { color: var(--yellow); }
  .kpi.red .kpi-value { color: var(--red); }
  .kpi.blue .kpi-value { color: var(--accent); }
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 28px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 16px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 12px; }
  .bar-label { width: 110px; font-size: 12px; color: var(--text-muted); text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 24px; background: rgba(255,255,255,0.03); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 600; color: white; font-family: var(--mono); min-width: 30px; }
  .bar-fill.red { background: linear-gradient(90deg, #dc2626, #ef4444); }
  .bar-fill.yellow { background: linear-gradient(90deg, #ca8a04, #eab308); }
  .bar-fill.blue { background: linear-gradient(90deg, #2563eb, #3b82f6); }
  .bar-fill.purple { background: linear-gradient(90deg, #7c3aed, #8b5cf6); }
  .donut-container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .donut-svg { width: 160px; height: 160px; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; width: 100%; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend-count { margin-left: auto; font-family: var(--mono); font-weight: 600; color: var(--text); }
  .insights-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 28px; }
  .insight-item { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; color: var(--text); }
  .insight-item.info { background: rgba(59,130,246,0.05); border: 1px solid rgba(59,130,246,0.15); }
  .insight-item.warning { background: rgba(202,138,4,0.05); border: 1px solid rgba(202,138,4,0.2); }
  .insight-item.critical { background: rgba(220,38,38,0.05); border: 1px solid rgba(220,38,38,0.2); }
  .insight-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block; }
  .insight-tag.info { color: var(--accent); }
  .insight-tag.warning { color: var(--yellow); }
  .insight-tag.critical { color: var(--red); }
  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid rgba(30,42,62,0.5); color: var(--text-muted); }
  tr:last-child td { border-bottom: none; }
  .badge-allow { background: #052e16; color: #4ade80; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-redact { background: #1a1500; color: #facc15; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-block { background: #1a0505; color: #f87171; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-override { background: #1a1000; color: #fb923c; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .loading { text-align: center; padding: 60px; color: var(--text-dim); font-size: 14px; }
  .error-msg { text-align: center; padding: 40px; color: var(--red); font-size: 14px; background: rgba(220,38,38,0.05); border: 1px solid rgba(220,38,38,0.2); border-radius: 12px; margin-bottom: 20px; }
  @media (max-width: 1000px) { .kpi-row { grid-template-columns: repeat(3, 1fr); } .charts-row { grid-template-columns: 1fr; } .dashboard { padding: 20px; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="shield">🛡️</div>
    <h1>Prompt Guardian <span>Compliance Dashboard</span></h1>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="status-text">Live — Azure Audit Trail</div>
    <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
  </div>
</div>
<div class="dashboard" id="dashboardContent">
  <div class="loading" id="loadingMsg">Loading audit data from Azure...</div>
</div>

<script>
var API_BASE = 'https://fn-promptguard-061l6f.azurewebsites.net/api';

function loadData() {
  document.getElementById('dashboardContent').innerHTML = '<div class="loading">Loading audit data from Azure...</div>';
  fetch(API_BASE + '/audit-summary')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' - endpoint may not be deployed yet. Redeploy with: func azure functionapp publish');
      return r.text();
    })
    .then(function(text) {
      if (!text || text.trim() === '') throw new Error('Empty response from server');
      var data = JSON.parse(text);
      if (data.error) { showError(data.error); return; }
      renderDashboard(data);
    })
    .catch(function(err) { showError(err.message); });
}

function showError(msg) {
  document.getElementById('dashboardContent').innerHTML = '<div class="error-msg">Failed to load audit data: ' + msg + '</div>';
}

function renderDashboard(data) {
  var total = data.total || 0;
  var allow = data.allow || 0;
  var redact = data.redact || 0;
  var block = data.block || 0;
  var overrides = data.overrides || 0;

  var html = '';

  // KPI row
  html += '<div class="kpi-row">';
  html += '<div class="kpi blue"><div class="kpi-label">Total Scans</div><div class="kpi-value">' + total + '</div><div class="kpi-sub">All classifications</div></div>';
  html += '<div class="kpi green"><div class="kpi-label">Allowed</div><div class="kpi-value">' + allow + '</div><div class="kpi-sub">' + (total > 0 ? Math.round(allow/total*100) : 0) + '% safe prompts</div></div>';
  html += '<div class="kpi yellow"><div class="kpi-label">Redacted</div><div class="kpi-value">' + redact + '</div><div class="kpi-sub">Sensitive content stripped</div></div>';
  html += '<div class="kpi red"><div class="kpi-label">Blocked</div><div class="kpi-value">' + block + '</div><div class="kpi-sub">Policy violations stopped</div></div>';
  html += '<div class="kpi yellow"><div class="kpi-label">Overrides</div><div class="kpi-value">' + overrides + '</div><div class="kpi-sub">' + (block > 0 ? Math.round(overrides/(block+overrides)*100) : 0) + '% of blocks overridden</div></div>';
  html += '</div>';

  // Charts row
  html += '<div class="charts-row">';

  // Category bar chart
  html += '<div class="chart-card"><div class="chart-title">Violations by Category</div><div class="bar-chart">';
  var cats = data.categories || {};
  var catEntries = Object.entries(cats).sort(function(a,b) { return b[1]-a[1]; });
  var catMax = catEntries.length > 0 ? catEntries[0][1] : 1;
  var catColors = { 'PHI': 'red', 'CREDENTIALS': 'red', 'PII': 'yellow', 'FINANCIAL': 'purple', 'LEGAL': 'blue' };
  if (catEntries.length === 0) {
    html += '<div style="color:var(--text-dim);font-size:13px;padding:20px;text-align:center;">No violations recorded yet</div>';
  }
  catEntries.forEach(function(item) {
    var pct = Math.round(item[1] / catMax * 100);
    var color = catColors[item[0]] || 'blue';
    html += '<div class="bar-row"><div class="bar-label">' + item[0] + '</div><div class="bar-track"><div class="bar-fill ' + color + '" style="width:' + pct + '%">' + item[1] + '</div></div></div>';
  });
  html += '</div></div>';

  // Donut chart
  html += '<div class="chart-card"><div class="chart-title">Action Distribution</div><div class="donut-container">';
  var segments = [
    { label: 'Allowed', count: allow, color: '#22c55e' },
    { label: 'Redacted', count: redact, color: '#eab308' },
    { label: 'Blocked', count: block, color: '#ef4444' },
    { label: 'Overridden', count: overrides, color: '#fb923c' }
  ];
  var segTotal = allow + redact + block + overrides;
  if (segTotal > 0) {
    var r = 60, cx = 80, cy = 80, sw = 18, offset = 0;
    var paths = '';
    segments.forEach(function(seg) {
      if (seg.count === 0) return;
      var angle = (seg.count / segTotal) * 360;
      var largeArc = angle > 180 ? 1 : 0;
      var rad = Math.PI / 180;
      var x1 = cx + r * Math.cos((offset - 90) * rad);
      var y1 = cy + r * Math.sin((offset - 90) * rad);
      var x2 = cx + r * Math.cos((offset + angle - 90) * rad);
      var y2 = cy + r * Math.sin((offset + angle - 90) * rad);
      if (angle >= 359.9) {
        paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + seg.color + '" stroke-width="' + sw + '"/>';
      } else {
        paths += '<path d="M ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + largeArc + ' 1 ' + x2 + ' ' + y2 + '" fill="none" stroke="' + seg.color + '" stroke-width="' + sw + '"/>';
      }
      offset += angle;
    });
    html += '<svg class="donut-svg" viewBox="0 0 160 160">' + paths + '<text x="80" y="76" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" font-family="JetBrains Mono">' + segTotal + '</text><text x="80" y="94" text-anchor="middle" fill="#64748b" font-size="10">total scans</text></svg>';
  }
  html += '<div class="donut-legend">';
  segments.forEach(function(seg) {
    html += '<div class="legend-item"><div class="legend-dot" style="background:' + seg.color + '"></div>' + seg.label + '<span class="legend-count">' + seg.count + '</span></div>';
  });
  html += '</div></div></div>';
  html += '</div>';

  // AI Insights
  html += '<div class="insights-card"><div class="chart-title">🧠 AI Governance Insights</div>';
  var insights = generateInsights(data);
  insights.forEach(function(i) {
    html += '<div class="insight-item ' + i.level + '"><span class="insight-tag ' + i.level + '">' + i.level + '</span>' + i.text + '</div>';
  });
  html += '</div>';

  // Recent events
  html += '<div class="table-card"><div class="chart-title">Recent Classification Events (Live from Azure Blob Storage)</div>';
  html += '<table><thead><tr><th>Time</th><th>User</th><th>Action</th><th>Category</th><th>Severity</th><th>Override</th></tr></thead><tbody>';
  var events = data.recent_events || [];
  if (events.length === 0) {
    html += '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);">No events yet — run the test suite or Sim UI to generate audit data</td></tr>';
  }
  events.forEach(function(e) {
    var ts = e.timestamp ? new Date(e.timestamp) : new Date();
    var timeStr = ts.toLocaleDateString() + ' ' + ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    var action = e.action || 'UNKNOWN';
    var badge = '';
    if (e.override) badge = '<span class="badge-override">OVERRIDE</span>';
    else if (action === 'ALLOW') badge = '<span class="badge-allow">ALLOW</span>';
    else if (action === 'REDACT') badge = '<span class="badge-redact">REDACT</span>';
    else badge = '<span class="badge-block">BLOCK</span>';
    var overrideInfo = e.override ? (e.override_reason || '').replace(/_/g, ' ') : '—';
    html += '<tr><td style="font-family:var(--mono);font-size:11px;">' + timeStr + '</td><td>' + (e.user_id||'—') + '</td><td>' + badge + '</td><td>' + (e.category||'—') + '</td><td>' + (e.severity||'—') + '</td><td>' + overrideInfo + '</td></tr>';
  });
  html += '</tbody></table></div>';

  document.getElementById('dashboardContent').innerHTML = html;
}

function generateInsights(data) {
  var insights = [];
  var total = data.total || 0;
  var block = data.block || 0;
  var overrides = data.overrides || 0;
  var cats = data.categories || {};
  var userBlocks = data.user_blocks || {};
  var overrideReasons = data.override_reasons || {};

  if (total === 0) {
    insights.push({ level: 'info', text: 'No audit data yet. Run the test suite or use the Sim UI to generate classification events.' });
    return insights;
  }

  // PHI analysis
  if (cats['PHI'] && cats['PHI'] > 0) {
    insights.push({ level: 'critical', text: '<strong>' + cats['PHI'] + ' PHI exposure attempt(s)</strong> intercepted. Protected Health Information was prevented from reaching external AI tools. HIPAA §164.502 compliance maintained.' });
  }

  // Credentials
  if (cats['CREDENTIALS'] && cats['CREDENTIALS'] > 0) {
    insights.push({ level: 'warning', text: '<strong>' + cats['CREDENTIALS'] + ' credential exposure(s)</strong> blocked. Users attempted to paste passwords, API keys, or connection strings into AI tools. Recommend secret rotation and password manager training.' });
  }

  // Override analysis
  if (overrides > 0) {
    var reasonEntries = Object.entries(overrideReasons);
    if (reasonEntries.length > 0) {
      var topReason = reasonEntries.sort(function(a,b) { return b[1]-a[1]; })[0];
      insights.push({ level: 'warning', text: '<strong>' + overrides + ' override(s)</strong> submitted. Most common reason: <strong>' + topReason[0].replace(/_/g, ' ') + '</strong>. All overrides logged with justification and manager notified.' });
    }
  }

  // Block rate
  var blockRate = Math.round((block + overrides) / total * 100);
  if (blockRate > 40) {
    insights.push({ level: 'critical', text: 'Block rate is <strong>' + blockRate + '%</strong> — above organizational target. Indicates widespread shadow AI usage with sensitive data. Recommend all-staff awareness training.' });
  } else if (blockRate > 0) {
    insights.push({ level: 'info', text: 'Block rate is <strong>' + blockRate + '%</strong>. Prompt Guardian is effectively filtering sensitive content while allowing <strong>' + Math.round((data.allow||0)/total*100) + '%</strong> of prompts through safely.' });
  }

  // User analysis
  var userEntries = Object.entries(userBlocks);
  if (userEntries.length > 0) {
    var topUser = userEntries.sort(function(a,b) { return b[1]-a[1]; })[0];
    if (topUser[1] > 1) {
      insights.push({ level: 'info', text: 'Most flagged user: <strong>' + topUser[0] + '</strong> with <strong>' + topUser[1] + ' blocked prompt(s)</strong>. Review whether additional training or policy update is needed.' });
    }
  }

  return insights;
}

loadData();
</script>
</body>
</html>
