<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 11px; fill: #586069; }
  .label { font-size: 11px; fill: #586069; }
  .small { font-size: 10px; font-weight: 600; }
</style>

<!-- Phase 1: Bicep Template -->
<rect x="160" y="15" width="360" height="50" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
<text class="title" x="340" y="36" text-anchor="middle" fill="#3C3489">Bicep template</text>
<text class="sub" x="340" y="52" text-anchor="middle">Infrastructure as code — single file deploys everything</text>

<!-- Arrow 1 -->
<line x1="340" y1="65" x2="340" y2="95" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arw)"/>
<text class="label" x="348" y="84" text-anchor="start">deploys</text>

<!-- Phase 2: Infrastructure -->
<rect x="60" y="95" width="560" height="75" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
<text class="title" x="340" y="115" text-anchor="middle" fill="#0C447C">Deployed infrastructure</text>
<rect x="80" y="125" width="88" height="28" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="small" x="124" y="143" text-anchor="middle" fill="#0C447C">VNet + NSG</text>
<rect x="180" y="125" width="70" height="28" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="small" x="215" y="143" text-anchor="middle" fill="#0C447C">VM</text>
<rect x="262" y="125" width="76" height="28" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="small" x="300" y="143" text-anchor="middle" fill="#0C447C">Storage</text>
<rect x="350" y="125" width="80" height="28" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="small" x="390" y="143" text-anchor="middle" fill="#0C447C">Public IP</text>
<rect x="442" y="125" width="80" height="28" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="small" x="482" y="143" text-anchor="middle" fill="#0C447C">Boot diag</text>
<rect x="534" y="125" width="70" height="28" rx="6" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
<text class="small" x="569" y="143" text-anchor="middle" fill="#0C447C">Key Vault</text>

<!-- Arrow 2 -->
<line x1="340" y1="170" x2="340" y2="205" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arw)"/>
<text class="label" x="348" y="192" text-anchor="start">emits metrics</text>

<!-- Phase 3: Monitoring -->
<rect x="80" y="205" width="520" height="50" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
<text class="title" x="340" y="225" text-anchor="middle" fill="#085041">Azure Monitor + alert rules</text>
<text class="sub" x="340" y="242" text-anchor="middle">CPU > 85%  |  VM stopped  |  Disk > 90%</text>
<!-- Alert dots -->
<circle cx="200" cy="230" r="4" fill="#1D9E75" opacity="0.6"/>
<circle cx="340" cy="230" r="4" fill="#1D9E75" opacity="0.6"/>
<circle cx="480" cy="230" r="4" fill="#1D9E75" opacity="0.6"/>

<!-- Arrow 3 -->
<line x1="340" y1="255" x2="340" y2="290" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arw)"/>
<text class="label" x="348" y="277" text-anchor="start">triggers automatically</text>

<!-- Phase 4: Runbooks -->
<rect x="80" y="290" width="520" height="50" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text class="title" x="340" y="310" text-anchor="middle" fill="#633806">Automation runbooks — self-healing</text>
<text class="sub" x="340" y="327" text-anchor="middle">Restart-VM  |  ScaleUp-VM  |  Cleanup-Disk</text>

<!-- Arrow 4 -->
<line x1="340" y1="340" x2="340" y2="375" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arw)"/>
<text class="label" x="348" y="362" text-anchor="start">notifies team</text>

<!-- Phase 5: Logic App -->
<rect x="140" y="375" width="400" height="50" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<text class="title" x="340" y="395" text-anchor="middle" fill="#712B13">Logic App — email notification</text>
<text class="sub" x="340" y="412" text-anchor="middle">Alert fired → fix applied → admin notified</text>

<!-- Feedback arrow -->
<path d="M600 315 L635 315 L635 150 L620 150" fill="none" stroke="#639922" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arw)"/>
<text class="label" x="642" y="200" text-anchor="start" transform="rotate(90, 642, 200)">fixes infrastructure</text>

<!-- Bottom summary -->
<rect x="140" y="450" width="400" height="36" rx="18" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="title" x="340" y="472" text-anchor="middle" fill="#444441">Detect → Fix → Notify → Repeat</text>

<!-- Arrow marker -->
<defs>
  <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
</svg>